name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (NSIS installer + Portable)
        run: npm run build-win -- --publish never

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $files = Get-ChildItem dist -File -Include "Matrix-UI-Heat-Transfer-*.exe", "Matrix-UI-Heat-Transfer-*.blockmap", "latest.yml" | Select-Object -ExpandProperty FullName
          gh release create $tag --title $tag --latest @files
